# ===============================================
# 1. CONFIGURACOES BASICAS (ESSENCIAL)
# ===============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/topomanager?rewriteBatchedStatements=true&useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================================
# 2. CONFIGURACOES ROBUSTAS DO HIKARICP (PRODUCAO)
# ===============================================

# [Tamanho do Pool] O ideal e que max-pool-size seja (numero de CPUs * 2) + 1
# Exemplo para um servidor de 4 nucleos (4*2 + 1 = 9)
spring.datasource.hikari.maximum-pool-size=10

# [IDLE] Numero minimo de conexoes ociosas a serem mantidas.
# Manter >= 1 garante que as conexoes estejam sempre prontas.
spring.datasource.hikari.minimum-idle=5

# [TIMEOUTS] Gerenciando falhas de forma agressiva

# Tempo maximo de espera para obter uma conexao do pool (30 segundos)
spring.datasource.hikari.connection-timeout=30000 

# Tempo maximo que uma conexao ociosa fica no pool antes de ser removida (10 minutos)
spring.datasource.hikari.idle-timeout=600000

# Tempo maximo de vida de uma conexao. Deve ser menor que o timeout do servidor MySQL. (30 minutos)
spring.datasource.hikari.max-lifetime=1800000 

# [VALOR EXCLUSIVO MYSQL - Performance]
# Query de validacao para verificar se a conexao esta viva.
# Recomendado para versoes antigas do driver, mas com o cj.jdbc.Driver nao e estritamente necessario
# pois ele usa a validacao nativa do driver.
# spring.datasource.hikari.connection-test-query=SELECT 1

# [Monitoramento] Habilita MBeans para monitorar o pool via JMX (JConsole, VisualVM). Essencial em producao.
spring.datasource.hikari.register-mbeans=true


# ===============================================
# 3. CONFIGURACOES DE PERFORMANCE DO JPA/HIBERNATE
# ===============================================

# Caching de Prepared Statements (MUITO importante para MySQL e HikariCP)
# Permite que o driver MySQL armazene em cache as consultas preparadas, melhorando a performance.
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

# [JPA/Hibernate] Configuracoes de Mapeamento (ATENCAO: MUDE \'update\' PARA PRODUCAO!)
spring.jpa.hibernate.ddl-auto=update 
# Valores recomendados: 
# - update (Desenvolvimento/Testes)
# - validate (Producao: Apenas verifica se o schema corresponde as Entidades)
# - none (Producao: Nao faz nada)

# [JPA/Hibernate] Dialeto Especifico do MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# [JPA/Hibernate] Exibir SQL (USE SO EM DESENVOLVIMENTO)
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true

# [JPA/Hibernate] Otimizacao Batch (Melhora a performance em inserts/updates em massa)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true